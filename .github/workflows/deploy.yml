name: Deploy NodusAI MCP Server

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Test ───────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run end-to-end tests
        env:
          NODUSAI_MOCK: "true"
        run: |
          node -e "
          import('./src/tools/index.js').then(async t => {
            // 1. Pricing
            const p = await t.nodusPricing();
            const pd = JSON.parse(p.content[0].text);
            if (!pd.pricing?.cost) throw new Error('Pricing failed: ' + JSON.stringify(pd));

            // 2. Get signal with session token
            const s = await t.nodusGetSignal({
              marketUrl:      'https://polymarket.com/event/test',
              sessionToken:   'mock-session-token-ci',
              desiredOutcome: 'YES',
              walletAddress:  '0xTestWallet',
              agentName:      'CI-Test-Agent',
            });
            const sd = JSON.parse(s.content[0].text);
            if (!sd.signal?.probability) throw new Error('Signal failed: ' + JSON.stringify(sd));

            // 3. Verify signal
            const v = await t.nodusVerifySignal({ queryId: sd.queryId });
            const vd = JSON.parse(v.content[0].text);
            if (!vd.verified) throw new Error('Verify failed: ' + JSON.stringify(vd));

            // 4. Admin stats
            const a = await t.nodusAdminStats();
            const ad = JSON.parse(a.content[0].text);
            if (ad.total_queries < 1) throw new Error('Stats failed: ' + JSON.stringify(ad));

            console.log('All tests passed');
            console.log('pricing:', pd.pricing.cost);
            console.log('probability:', sd.signal.probability);
            console.log('confidence:', sd.signal.confidence_score);
            console.log('total queries:', ad.total_queries);
          }).catch(e => { console.error(e); process.exit(1); });
          "

  # ── Deploy to Railway ──────────────────────────────────────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service nodusai-mcp --detach
